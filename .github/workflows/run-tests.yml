name: Run Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**/src/**'
      - 'projects/**/tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for req in $(find projects -name "requirements.txt"); do
            pip install -r "$req"
          done

      - name: Run tests
        run: |
          for proj in projects/*/; do
            if [ -d "${proj}tests" ]; then
              echo "🧪 Testing: $proj"
              cd "$proj"
              python -m pytest tests/ -v || exit 1
              cd ../..
            fi
          done
